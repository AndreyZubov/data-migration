spring:
  application:
    name: data-migration

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/datamigration}
    username: ${DB_USER:datamigration}
    password: ${DB_PASSWORD:datamigration}
    hikari:
      maximum-pool-size: 20

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
      hibernate.format_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true

  rabbitmq:
    host: ${RABBIT_HOST:localhost}
    port: ${RABBIT_PORT:5672}
    username: ${RABBIT_USER:guest}
    password: ${RABBIT_PASSWORD:guest}

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false       # we launch jobs explicitly from the RabbitMQ consumer

  servlet:
    multipart:
      max-file-size: 256MB
      max-request-size: 256MB

server:
  port: 8080
  forward-headers-strategy: framework

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:data-migration}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    io.datamigration: INFO
    org.springframework.batch: WARN
    org.hibernate.SQL: WARN
